# =============================================================================
# Remembr — Docker Compose (Self-Hosted, Zero-Dependency)
# =============================================================================
# First-time setup:  bash scripts/docker-init.sh
# Day-to-day:        docker compose up -d
# Stop:              docker compose down
# Nuke volumes:      docker compose down -v
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector — Long-term episodic memory storage
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: remembr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: remembr
      POSTGRES_PASSWORD: remembr
      POSTGRES_DB: remembr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remembr -d remembr"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # PgBouncer — Connection pooler (transaction mode)
  # Routes DATABASE_URL traffic through a small connection pool so the
  # FastAPI server can hold many open asyncpg connections cheaply.
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: remembr-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: remembr
      DB_PASSWORD: remembr
      DB_NAME: remembr
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 200
      AUTH_TYPE: md5
      SERVER_TLS_SSLMODE: disable
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis — Short-term memory cache and rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: remembr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Ollama — Local embedding inference (no API key required)
  # Pull the model on first run: docker compose run --rm ollama-init
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: remembr-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Ollama Init — Pulls nomic-embed-text once, then exits.
  # Runs automatically on `docker compose up -d` (restart: "no").
  # Re-running is safe — ollama pull is idempotent.
  # ---------------------------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    container_name: remembr-ollama-init
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    depends_on:
      ollama:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery Worker — processes embedding generation tasks from the queue
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: remembr-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://remembr:remembr@pgbouncer:6432/remembr}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Celery Beat — periodic task scheduler
  # Runs the daily purge_soft_deleted task at 03:00 UTC.
  # ---------------------------------------------------------------------------
  worker-beat:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: remembr-worker-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://remembr:remembr@pgbouncer:6432/remembr}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Remembr Server — FastAPI application
  # ---------------------------------------------------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: remembr-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://remembr:remembr@pgbouncer:6432/remembr}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
