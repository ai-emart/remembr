{% for ep in episodes %}
<tr>
  <td style="white-space:nowrap">{{ ep.created_at.strftime('%H:%M:%S') }}</td>
  <td>
    <span class="badge badge-{{ ep.role }}">{{ ep.role }}</span>
  </td>
  <td title="{{ ep.content }}">
    <span class="content-truncate">{{ ep.content }}</span>
  </td>
  <td>
    {% for t in ep.tags %}<span class="tag">{{ t }}</span>{% endfor %}
  </td>
  <td class="status-{{ ep.embedding_status }}">{{ ep.embedding_status }}</td>
</tr>
{% endfor %}

{% if has_more %}
<tr id="load-more-trigger">
  <td colspan="5" class="load-more-cell">
    <button
      class="btn btn-ghost"
      hx-get="/admin/sessions/{{ session_id }}/memories?offset={{ next_offset }}"
      hx-target="#load-more-trigger"
      hx-swap="outerHTML"
    >Load more</button>
  </td>
</tr>
{% endif %}
