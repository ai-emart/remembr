name: Docker

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cp .env.example .env
          {
            echo "SECRET_KEY=test-secret-key"
            echo "EMBEDDING_PROVIDER=sentence_transformers"
          } >> .env

      - name: Build server image
        run: docker compose -f docker-compose.test.yml build server

      - name: Start containers
        run: docker compose -f docker-compose.test.yml up -d postgres redis pgbouncer

      - name: Wait for dependencies
        run: |
          echo "Waiting for postgres..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.test.yml exec -T postgres pg_isready -U remembr; then
              break
            fi
            sleep 2
          done

      - name: Build and start server
        run: docker compose -f docker-compose.test.yml up -d server

      - name: Wait for server and capture immediate logs
        run: |
          sleep 15
          echo "=== SERVER LOGS ==="
          docker compose -f docker-compose.test.yml logs server
          echo "=== CONTAINER STATUS ==="
          docker compose -f docker-compose.test.yml ps -a

      - name: Check server health
        run: |
          docker compose -f docker-compose.test.yml logs server
          curl -f http://localhost:8000/api/v1/health

      - name: Run smoke test
        run: bash scripts/smoke-test.sh
        env:
          SMOKE_TEST_URL: http://localhost:8000

      - name: Capture logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs server || true
          docker compose -f docker-compose.test.yml ps -a || true

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
