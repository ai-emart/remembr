name: Docker

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-test-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cp .env.example .env
          {
            echo "SECRET_KEY=test-secret-key"
            echo "EMBEDDING_PROVIDER=sentence_transformers"
          } >> .env

      - name: Build server image
        run: docker compose -f docker-compose.yml build server

      - name: Start test Docker stack
        run: docker compose -f docker-compose.test.yml up -d postgres redis pgbouncer && docker compose -f docker-compose.yml up -d server

      - name: Wait for services to be healthy
        run: |
          for i in {1..30}; do
            if docker compose -f docker-compose.test.yml ps | grep -q "healthy"; then
              break
            fi
            sleep 2
          done

      - name: Run smoke test
        env:
          SKIP_COMPOSE: "1"
        run: bash scripts/smoke-test.sh

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans && docker compose -f docker-compose.test.yml down -v --remove-orphans
