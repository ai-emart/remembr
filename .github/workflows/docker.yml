name: Docker

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cp .env.example .env
          {
            echo "SECRET_KEY=test-secret-key"
            echo "EMBEDDING_PROVIDER=sentence_transformers"
          } >> .env

      - name: Build server image
        run: docker compose -f docker-compose.test.yml build server

      - name: Start test Docker stack
        run: docker compose -f docker-compose.test.yml up -d --wait postgres redis pgbouncer server

      - name: Capture container logs on failure
        if: always()
        run: |
          echo "=== SERVER LOGS ==="
          docker compose -f docker-compose.test.yml logs server || true
          echo "=== POSTGRES LOGS ==="
          docker compose -f docker-compose.test.yml logs postgres || true
          echo "=== PGBOUNCER LOGS ==="
          docker compose -f docker-compose.test.yml logs pgbouncer || true
          echo "=== CONTAINER STATUS ==="
          docker compose -f docker-compose.test.yml ps -a || true

      - name: Run smoke test
        env:
          SKIP_COMPOSE: "1"
        run: bash scripts/smoke-test.sh

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
