version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      patch-updates:
        update-types:
          - patch

  - package-ecosystem: pip
    directory: "/server"
    schedule:
      interval: weekly
    groups:
      patch-updates:
        update-types:
          - patch

  - package-ecosystem: npm
    directory: "/sdk/typescript"
    schedule:
      interval: weekly
    groups:
      patch-updates:
        update-types:
          - patch
