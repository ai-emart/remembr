services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: remembr-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: remembr
      POSTGRES_PASSWORD: remembr
      POSTGRES_DB: remembr
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remembr -d remembr"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: remembr-test-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: remembr
      DB_PASSWORD: remembr
      DB_NAME: remembr
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 200
      AUTH_TYPE: md5
      SERVER_TLS_SSLMODE: disable
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: remembr-test-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: remembr-server
    restart: "no"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://remembr:remembr@remembr-test-postgres:5432/remembr
      REDIS_URL: redis://remembr-test-redis:6379
      SECRET_KEY: test-secret-key-for-ci-only-not-production
      EMBEDDING_PROVIDER: sentence_transformers
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
